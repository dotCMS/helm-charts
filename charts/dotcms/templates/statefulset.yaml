{{- if .Values.coreServiceEnabled }}
{{- range $envName := keys $.Values.environments }}
{{- with include "dotcms.mergeEnvironment" ( mergeOverwrite $ (dict "envName" $envName )) | fromYaml }}
{{- $fullName := include "dotcms.env.fullName" . }}
{{- $dbName := include "dotcms.db.name" . }}
{{- $namespace := .Values.customerName }}
{{- $configMapMetadata := include "dotcms.upgradeConfigMapName" . }}
{{- $scriptsConfigMap := printf "%s-%s-scripts" .Values.customerName .Values.environment }}
{{- $licenseSecretName := include "dotcms.secret.shared.name" (dict "Values" .Values "secretName" "license" "overridePath" "") | quote }}
{{- $licenseSecretExists := ne (lookup "v1" "Secret" $namespace $licenseSecretName) nil }}
{{- $useLicense := default (or $licenseSecretExists .Values.license) .Values.useLicense }}
{{/* $dbSecretName: database credential secret — local vs managed */}}
{{- $dbSecretName := "" }}
{{- if .Values.database.local.enabled }}
  {{- $dbSecretName = include "dotcms.secret.shared.name" (dict "Values" .Values "secretName" "db-local-admin") }}
{{- else }}
  {{- $dbSecretName = include "dotcms.secret.env.name" (dict "Values" .Values "secretName" "database" "overridePath" "database.secretNameOverride") }}
{{- end }}
{{/* Affinity type: preferred (default, 81.2% of customers) | required | none */}}
{{- $affinityType := dig "affinity" "type" "preferred" .Values }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  namespace: {{ include "dotcms.name.customer" . }}
  name: {{ $fullName }}
  labels:
    {{- if eq $.Values.cloudProvider "aws" }}
    app.dotcms.cloud/aws-region: {{ $.Values.aws.region }}
    {{- end }}
    app.kubernetes.io/instance: {{ $.Values.customerName }}
spec:
  selector:
    matchLabels:
      app: {{ $.Values.app }}
      fullname: {{ $fullName }}
  serviceName: {{ $fullName }}
  replicas: {{ .Values.replicas }}
  podManagementPolicy: {{ .Values.podManagementPolicy }}
  template:
    metadata:
      annotations:
        {{- if $.Values.linkerd.enabled }}
        linkerd.io/inject: enabled
        config.alpha.linkerd.io/proxy-wait-before-exit-seconds: {{ $.Values.linkerd.proxyWaitBeforeExitSeconds | quote }}
        {{- end }}
        {{- if $.Values.prometheus.enabled }}
        prometheus.io/scrape: {{ $.Values.prometheus.annotations.scrape | quote }}
        prometheus.io/port: {{ $.Values.management.port | quote }}
        prometheus.io/path: {{ $.Values.prometheus.annotations.path | quote }}
        {{- end }}
      labels:
        app: {{ $.Values.app }}
        env: {{ .Values.environment }}
        ver: {{ include "dotcms.version" . }}
        cust: {{ $.Values.customerName }}
        fullname: {{ $fullName }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      initContainers:

        # Purpose: Block pod startup until the pre-upgrade Job completes.
        # The pre-upgrade job scales down the StatefulSet; this gate ensures
        # the new pods don't start before schema migrations finish.
        - name: wait-for-job
          image: groundnuty/k8s-wait-for:no-root-v1.7
          imagePullPolicy: IfNotPresent
          args:
            - job
            - {{ include "dotcms.preUpgradeJobName" . }}

        # Purpose: Block pod startup until the local DB deployment is Ready.
        # Only active in dev/local environments where database.local.enabled=true.
        {{- if .Values.database.local.enabled }}
        - name: wait-for-db
          image: bitnami/kubectl:1.32.0
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-c"]
          args:
            - |
              echo "Waiting for DB to be ready..."
              kubectl wait --for=condition=Ready pod -l app=db -n {{ $namespace }} --timeout=300s
              echo "DB is ready."
        {{- end }}

        # Purpose: Read backup/restore operation from ConfigMap and write signal
        # file (/tmp/backup_restore) for the backup-restore container.
        # Script source: {{ $scriptsConfigMap }} ConfigMap.
        - name: check-backup-restore
          image: bitnami/kubectl:1.32.0
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "/scripts/check-backup-restore.sh"]
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: admin-shared-{{ $envName }}
              mountPath: /tmp
            - name: dotcms-shared
              mountPath: /data/shared

        # Purpose: Execute pg_dump (backup) or psql restore based on signal file
        # written by check-backup-restore. Writes /tmp/backup_completed or
        # /tmp/restore_completed for the update-configmap container.
        # Script source: {{ $scriptsConfigMap }} ConfigMap.
        - name: backup-restore
          image: pgvector/pgvector:pg16
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "/scripts/backup-restore.sh"]
          env:
            - name: DB_HOST
              value: "{{ include "dotcms.database.host" . }}"
            - name: DB_NAME
              value: {{ $dbName }}
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ $dbSecretName }}
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $dbSecretName }}
                  key: password
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: admin-shared-{{ $envName }}
              mountPath: /tmp
            - name: dotcms-shared
              mountPath: /data/shared

        # Purpose: Check if a schema upgrade is required by reading ConfigMap
        # {{ $configMapMetadata }}. Writes /tmp/skip-upgrade if no upgrade is needed,
        # which the dotcms-upgrade container checks before running migrations.
        - name: check-upgrade
          image: bitnami/kubectl:1.32.0
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-c"]
          args:
            - |
              if [ -f /tmp/skip-upgrade ]; then
                rm /tmp/skip-upgrade
              fi
              echo "Checking upgrade status from ConfigMap {{ $configMapMetadata }}..."
              UPGRADE_REQUIRED=$(kubectl get configmap {{ $configMapMetadata }} \
                -n {{ $namespace }} -o=jsonpath='{.data.upgradeRequired}' 2>/dev/null || echo "false")
              echo "Upgrade required: $UPGRADE_REQUIRED"
              if [ "$UPGRADE_REQUIRED" != "true" ]; then
                echo "Upgrade not required. Writing /tmp/skip-upgrade..."
                echo "skip-upgrade" > /tmp/skip-upgrade
              fi
          volumeMounts:
            - name: admin-shared-{{ $envName }}
              mountPath: /tmp

        # Purpose: Run dotCMS startup with DOT_SHUTDOWN_ON_STARTUP=true to apply
        # schema migrations. Skipped if /tmp/skip-upgrade exists (written by check-upgrade).
        - name: dotcms-upgrade
          {{- include "dotcms.container.spec" (merge (dict "IsUpgradeJob" true "EnableProbes" false "ShutdownOnStartupValue" true "UseLicense" $useLicense) .) | nindent 10 }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              if [ -f /tmp/skip-upgrade ]; then
                echo "Upgrade not required. Skipping container execution."
              else
                echo "Upgrade required. Launching original entrypoint..."
                echo "env DOT_SHUTDOWN_ON_STARTUP=$DOT_SHUTDOWN_ON_STARTUP"
                exec /srv/entrypoint.sh dotcms
              fi
              exit 0

        # Purpose: After backup-restore completes, update ConfigMap {{ $configMapMetadata }}
        # to mark the operation as completed (prevents re-run on next rollout).
        - name: update-configmap
          image: bitnami/kubectl:1.32.0
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-c"]
          args:
            - |
              if [ -f /tmp/backup_completed ]; then
                echo "Marking backup as completed in ConfigMap..."
                kubectl patch configmap {{ $configMapMetadata }} -n {{ $namespace }} \
                  --type merge --patch '{"data":{"backupState":"completed"}}'
                echo "ConfigMap updated."
              elif [ -f /tmp/restore_completed ]; then
                echo "Marking restore as completed in ConfigMap..."
                kubectl patch configmap {{ $configMapMetadata }} -n {{ $namespace }} \
                  --type merge --patch '{"data":{"restoreState":"completed"}}'
                echo "ConfigMap updated."
              else
                echo "No completion signal found. Skipping ConfigMap update."
              fi
          volumeMounts:
            - name: admin-shared-{{ $envName }}
              mountPath: /tmp

      containers:
        - name: dotcms
          {{- include "dotcms.container.spec" (merge (dict "IsUpgradeJob" false "EnableProbes" true "ShutdownOnStartupValue" false "useLicense" $useLicense) .) | nindent 10 }}

      {{- if ne $affinityType "none" }}
      affinity:
        podAntiAffinity:
          {{- if eq $affinityType "required" }}
          # required: pods MUST be on different nodes — use for HA prod environments
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: fullname
                    operator: In
                    values:
                      - {{ $fullName }}
              topologyKey: {{ .Values.affinity.topologyKey | default "kubernetes.io/hostname" }}
          {{- else }}
          # preferred (default): pods SHOULD be on different nodes — scheduler may co-locate under resource pressure
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: fullname
                      operator: In
                      values:
                        - {{ $fullName }}
                topologyKey: {{ .Values.affinity.topologyKey | default "kubernetes.io/hostname" }}
          {{- end }}
      {{- end }}

      volumes:
      - name: admin-shared-{{ $envName }}
        emptyDir: {}
      - name: dotcms-shared
        persistentVolumeClaim:
          claimName: {{ include "dotcms.pvc.env.name" . }}
      # ConfigMap with extracted init container bash scripts
      - name: scripts
        configMap:
          name: {{ $scriptsConfigMap }}
          defaultMode: 0755
      {{- if .Values.secrets.useSecretsStoreCSI }}
      - name: {{ include "dotcms.secret.provider.className" . }}
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: {{ include "dotcms.secret.provider.className" . }}
      {{- end }}
      serviceAccountName: {{ include "dotcms.serviceaccount.app" . }}

{{- end }}

{{- end }}
{{- end }}
