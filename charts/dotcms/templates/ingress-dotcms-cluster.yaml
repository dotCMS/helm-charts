{{- range $envName := keys .Values.environments }}
{{- with include "dotcms.mergeEnvironment" ( mergeOverwrite $ (dict "envName" $envName )) | fromYaml }}
{{- $fullName := include "dotcms.env.fullName" . }}
{{- $serviceName := include "dotcms.env.serviceName" . }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.customerName }}-{{ .Values.environment }}-alb
  namespace: {{ .Values.customerName }}
  annotations:
    # -- ALB controller: scheme + target type
    service.beta.kubernetes.io/aws-load-balancer-internal: 'false'
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    # -- Vanta compliance tagging: VantaNonProd derived from environment name
    alb.ingress.kubernetes.io/tags: >-
      dotcms.client.name.short={{ .Values.customerName }},
      VantaOwner=example@dotcms.com,
      VantaDescription=ALB for {{ .Values.customerName }} {{ .Values.environment }},
      VantaNonProd={{ if contains "prod" .Values.environment }}false{{ else }}true{{ end }}
    # -- Healthcheck: application port/path (not readinessProbe — different purpose)
    alb.ingress.kubernetes.io/backend-protocol: {{ dig "ingress" "alb" "healthcheck" "backendProtocol" "HTTP" .Values }}
    alb.ingress.kubernetes.io/healthcheck-protocol: {{ dig "ingress" "alb" "healthcheck" "protocol" "HTTP" .Values }}
    alb.ingress.kubernetes.io/healthcheck-port: '{{ dig "ingress" "alb" "healthcheck" "port" "8082" .Values }}'
    alb.ingress.kubernetes.io/healthcheck-path: '{{ dig "ingress" "alb" "healthcheck" "path" "/api/v1/appconfiguration" .Values }}'
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '{{ dig "ingress" "alb" "healthcheck" "intervalSeconds" "30" .Values }}'
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '{{ dig "ingress" "alb" "healthcheck" "timeoutSeconds" "5" .Values }}'
    alb.ingress.kubernetes.io/success-codes: '{{ dig "ingress" "alb" "healthcheck" "successCodes" "200" .Values }}'
    alb.ingress.kubernetes.io/healthy-threshold-count: '{{ dig "ingress" "alb" "healthcheck" "healthyThresholdCount" "2" .Values }}'
    alb.ingress.kubernetes.io/unhealthy-threshold-count: '{{ dig "ingress" "alb" "healthcheck" "unhealthyThresholdCount" "2" .Values }}'
    # -- SSL redirect listener rule
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    alb.ingress.kubernetes.io/actions.ssl-redirect: '{"Type": "redirect", "RedirectConfig": { "Protocol": "HTTPS", "Port": "443", "StatusCode": "HTTP_301"}}'
    {{- if eq .Values.ingress.type "alb" }}
    {{- include "dotcms.ingress.alb.annotations" . | nindent 4 }}
    {{- end }}
spec:
  {{- if eq .Values.ingress.type "nginx" }}
  tls:
    - hosts:
        - {{ include "dotcms.ingress.externalHost" . | quote }}
      secretName: {{ .Values.ingress.tlsSecretName }}
  {{- end }}
  # -- Use spec.ingressClassName only; deprecated kubernetes.io/ingress.class annotation removed
  ingressClassName: {{ .Values.ingress.type }}
  rules:
    {{ include "dotcms.ingress.alb.additionalHosts" . | nindent 4 }}
    - host: {{ include "dotcms.ingress.externalHost" . | quote }}
      http:
        paths:
          - backend:
              service:
                name: ssl-redirect
                port:
                  name: use-annotation
            path: /
            pathType: Prefix
          - backend:
              service:
                name: {{ $serviceName }}
                port:
                  number: 8082
            path: /
            pathType: Prefix
  defaultBackend:
    service:
      name: {{ $serviceName }}
      port:
        number: 8082
{{- end }}
{{- end }}
